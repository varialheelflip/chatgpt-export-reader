<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Export Reader</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h1>会话列表</h1>
        <form id="directory-form" class="directory-form">
          <label class="field-label field-label-row" for="directory-input">
            <span>JSON 文件夹路径</span>
            <span class="tooltip-trigger" tabindex="0" aria-label="路径说明">
              ?
              <span class="tooltip-bubble">
                浏览器无法稳定拿到可持久化的系统目录路径，所以这里改为由服务端保存 JSON 文件夹路径。
              </span>
            </span>
          </label>
          <input
            id="directory-input"
            class="directory-input"
            type="text"
            placeholder="例如：D:\exports\chatgpt"
            autocomplete="off"
          />
          <div class="directory-actions">
            <button type="submit" id="save-directory-btn">保存并加载</button>
            <button type="button" id="import-zip-btn" class="secondary">导入 ZIP</button>
          </div>
          <input id="zip-input" type="file" accept=".zip,application/zip" hidden />
          <div id="directory-status" class="directory-status"></div>
        </form>
        <div id="conversation-list" class="conversation-list"></div>
      </aside>

      <main class="chat-panel">
        <section id="chat-messages" class="chat-messages"></section>
      </main>
    </div>

    <template id="message-template">
      <article class="message-card">
        <div class="message-meta"></div>
        <div class="message-content"></div>
        <div class="branch-switcher"></div>
      </article>
    </template>

    <div id="dialog-overlay" class="dialog-overlay hidden" aria-hidden="true">
      <div class="dialog-card" role="dialog" aria-modal="true" aria-labelledby="dialog-title">
        <div id="dialog-title" class="dialog-title">提示</div>
        <div id="dialog-message" class="dialog-message"></div>
        <div class="dialog-actions">
          <button type="button" id="dialog-cancel-btn" class="secondary">取消</button>
          <button type="button" id="dialog-confirm-btn">确定</button>
        </div>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
