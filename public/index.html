<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Export Reader</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h1>会话列表</h1>
        <p class="tip">浏览器无法稳定拿到可持久化的系统目录路径，因此这里改为后端保存文件夹路径。</p>
        <form id="directory-form" class="directory-form">
          <label class="field-label" for="directory-input">JSON 文件夹路径</label>
          <input
            id="directory-input"
            class="directory-input"
            type="text"
            placeholder="例如：D:\\exports\\chatgpt"
            autocomplete="off"
          />
          <div class="directory-actions">
            <button type="submit" id="save-directory-btn">保存并加载</button>
            <button type="button" id="clear-directory-btn" class="secondary">清空</button>
          </div>
          <div id="directory-status" class="directory-status"></div>
        </form>
        <div id="conversation-list" class="conversation-list"></div>
      </aside>

      <main class="chat-panel">
        <header class="chat-header">
          <h2 id="chat-title">请选择一个会话</h2>
        </header>
        <section id="chat-messages" class="chat-messages"></section>
      </main>
    </div>

    <template id="message-template">
      <article class="message-card">
        <div class="message-meta"></div>
        <div class="message-content"></div>
        <div class="branch-switcher"></div>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
